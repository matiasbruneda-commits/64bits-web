<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" role="img" aria-label="64 Bits Belgrano">

  <defs>
    <!-- Gradiente principal del cuerpo de la manzana -->
    <linearGradient id="appleGrad" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#1A7FFF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>

    <!-- Gradiente de los rayos (blanco a azul claro) -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C0D8FF"/>
    </linearGradient>

    <!-- Sombra interior sutil para profundidad -->
    <filter id="appleDepth" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="3" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════
       HOJA / STEM — forma propia, apunta hacia arriba-derecha
       ══════════════════════════════════════════ -->
  <path d="M 138 91
           C 144 74 164 57 176 44
           C 160 55 136 72 138 91 Z"
        fill="#0044CC"/>

  <!-- ══════════════════════════════════════════
       CUERPO DE LA MANZANA — silueta propia (no es el logo de Apple)
       Forma más geométrica/tech: lóbulos angulados, mordida angular derecha
       ══════════════════════════════════════════ -->
  <path d="
    M 140 92
    C 120 92 97 77 84 87
    C 66 100 51 124 46 152
    C 40 184 44 218 58 245
    C 70 268 95 287 122 290
    C 132 292 138 290 140 288
    C 142 290 148 292 158 290
    C 185 287 210 268 222 245
    C 230 224 228 207 222 194
    C 215 180 200 172 200 162
    C 200 150 215 139 226 127
    C 234 114 232 97 222 86
    C 212 75 192 75 180 86
    C 166 78 153 92 140 92
    Z"
        fill="url(#appleGrad)"/>

  <!-- Reflejo sutil en parte superior-izquierda (premium glass effect) -->
  <ellipse cx="108" cy="128" rx="38" ry="23" fill="white" opacity="0.06"/>

  <!-- ══════════════════════════════════════════
       RAYO SUPERIOR-DERECHO — minimalista, angular
       ══════════════════════════════════════════ -->
  <path d="M 218 84
           L 203 114
           L 215 114
           L 198 146
           L 233 108
           L 218 108
           Z"
        fill="url(#boltGrad)" opacity="0.94"/>

  <!-- ══════════════════════════════════════════
       RAYO INFERIOR-IZQUIERDO — minimalista, angular
       ══════════════════════════════════════════ -->
  <path d="M 78 216
           L 64 243
           L 76 243
           L 61 271
           L 95 242
           L 80 242
           Z"
        fill="url(#boltGrad)" opacity="0.94"/>

  <!-- ══════════════════════════════════════════
       TIPOGRAFÍA
       "64" — bold, grande
       "bits" — light, chico
       ══════════════════════════════════════════ -->
  <text x="58" y="234"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="92"
        letter-spacing="-4"
        fill="white">64</text>

  <text x="152" y="266"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="300"
        font-size="37"
        fill="white"
        opacity="0.92">bits</text>

</svg>
